<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momentum - Your Task Companion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #ec4899;
            --accent-alt: #f59e0b;
            --bg-light: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        body.dark-mode {
            --bg-light: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-light) 0%, #f1f5f9 100%);
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
            min-height: 100vh;
            padding: 20px;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0f172a 0%, #1a1f35 100%);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-content h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header-content p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .theme-toggle {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: var(--bg-card);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(20deg);
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
        }

        .input-section {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            animation: slideUp 0.6s ease-out 0.1s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        #taskInput {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            background: var(--bg-card);
            color: var(--text-primary);
            transition: all 0.3s ease;
            font-weight: 500;
        }

        #taskInput:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            transform: translateY(-2px);
        }

        #taskInput::placeholder {
            color: var(--text-secondary);
        }

        .add-btn {
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-md);
            min-width: 100px;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
        }

        .add-btn:active {
            transform: translateY(0);
            box-shadow: var(--shadow-sm);
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 32px;
            animation: slideUp 0.6s ease-out 0.2s both;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-top: 4px;
        }

        .task-section h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .task-section h2::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 2px;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            animation: slideUp 0.6s ease-out 0.3s both;
        }

        .task-item {
            background: var(--bg-card);
            padding: 16px;
            border-radius: 12px;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .task-item:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
            transform: translateX(4px);
        }

        .task-item.completed {
            background: rgba(16, 185, 129, 0.05);
            border-color: var(--success);
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .checkbox {
            width: 24px;
            height: 24px;
            border-radius: 8px;
            border: 2px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
            background: var(--bg-card);
        }

        .task-item.completed .checkbox {
            background: var(--success);
            border-color: var(--success);
        }

        .checkbox::after {
            content: '✓';
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s ease;
        }

        .task-item.completed .checkbox::after {
            opacity: 1;
            transform: scale(1);
        }

        .task-content {
            flex: 1;
        }

        .task-text {
            word-break: break-word;
            font-weight: 500;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .task-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
            font-weight: 400;
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .edit-btn {
            color: var(--accent-alt);
        }

        .edit-btn:hover {
            background: rgba(245, 158, 11, 0.1);
            transform: scale(1.15);
        }

        .delete-btn {
            color: var(--danger);
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            transform: scale(1.15);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            animation: fadeIn 0.6s ease-out 0.4s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .empty-state p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease-out;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            padding: 28px;
            border-radius: 16px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.3s ease-out;
        }

        .modal-content h3 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .modal-input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            background: var(--bg-light);
            color: var(--text-primary);
            margin-bottom: 16px;
            font-weight: 500;
        }

        .modal-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .modal-btn.save {
            background: var(--primary);
            color: white;
        }

        .modal-btn.save:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .modal-btn.cancel {
            background: var(--border);
            color: var(--text-primary);
        }

        .modal-btn.cancel:hover {
            background: var(--text-secondary);
            color: white;
        }

        .no-tasks {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 20px;
            font-size: 0.95rem;
        }

        @media (max-width: 600px) {
            .header-content h1 {
                font-size: 2rem;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .task-item {
                padding: 12px;
            }

            .task-text {
                font-size: 0.95rem;
            }

            .input-section {
                flex-direction: column;
            }

            .add-btn {
                width: 100%;
            }
        }

        @keyframes taskSlideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .task-item {
            animation: taskSlideIn 0.4s ease-out;
        }


        * {
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>Momentum</h1>
                <p>Stay focused, get things done</p>
            </div>
            <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">🌙</button>
        </header>

        <div class="input-section">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="taskInput" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
            </div>
            <button class="add-btn" id="addBtn">Add</button>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalTasks">0</div>
                <div class="stat-label">Total Tasks</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completedTasks">0</div>
                <div class="stat-label">Completed</div>
            </div>
        </div>

        <div class="task-section">
            <h2>Your Tasks</h2>
            <div class="task-list" id="taskList"></div>
        </div>
    </div>

 
    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3>Edit Task</h3>
            <input 
                type="text" 
                class="modal-input" 
                id="editInput"
                placeholder="Edit your task..."
            >
            <div class="modal-buttons">
                <button class="modal-btn save" id="saveEditBtn">Save</button>
                <button class="modal-btn cancel" id="cancelEditBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script>

        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');
        const themeToggle = document.getElementById('themeToggle');
        const totalTasksEl = document.getElementById('totalTasks');
        const completedTasksEl = document.getElementById('completedTasks');
        const editModal = document.getElementById('editModal');
        const editInput = document.getElementById('editInput');
        const saveEditBtn = document.getElementById('saveEditBtn');
        const cancelEditBtn = document.getElementById('cancelEditBtn');

        
        let tasks = [];
        let editingTaskId = null;

        
        document.addEventListener('DOMContentLoaded', () => {
            loadTasks();
            loadTheme();
            updateStats();
            renderTasks();
        });

       
        addBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        themeToggle.addEventListener('click', toggleTheme);
        saveEditBtn.addEventListener('click', saveEdit);
        cancelEditBtn.addEventListener('click', closeEditModal);
        editInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') saveEdit();
        });


        function addTask() {
            const text = taskInput.value.trim();
            if (text === '') {
                taskInput.focus();
                return;
            }

            const task = {
                id: Date.now(),
                text: text,
                completed: false,
                createdAt: new Date().toLocaleString()
            };

            tasks.push(task);
            saveTasks();
            taskInput.value = '';
            taskInput.focus();
            updateStats();
            renderTasks();
        }

        function deleteTask(id) {
            tasks = tasks.filter(task => task.id !== id);
            saveTasks();
            updateStats();
            renderTasks();
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                updateStats();
                renderTasks();
            }
        }

        function openEditModal(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                editingTaskId = id;
                editInput.value = task.text;
                editModal.classList.add('active');
                editInput.focus();
                editInput.select();
            }
        }

        function closeEditModal() {
            editModal.classList.remove('active');
            editingTaskId = null;
            editInput.value = '';
        }

        function saveEdit() {
            const newText = editInput.value.trim();
            if (newText === '') {
                editInput.focus();
                return;
            }

            const task = tasks.find(t => t.id === editingTaskId);
            if (task) {
                task.text = newText;
                saveTasks();
                renderTasks();
                closeEditModal();
            }
        }

        function renderTasks() {
            taskList.innerHTML = '';

            if (tasks.length === 0) {
                taskList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <h3>No tasks yet</h3>
                        <p>Start by adding a task to get things rolling!</p>
                    </div>
                `;
                return;
            }

            tasks.forEach(task => {
                const taskItem = document.createElement('div');
                taskItem.className = `task-item ${task.completed ? 'completed' : ''}`;
                
                taskItem.innerHTML = `
                    <div class="checkbox" onclick="toggleTask(${task.id})"></div>
                    <div class="task-content">
                        <div class="task-text">${escapeHtml(task.text)}</div>
                        <div class="task-time">${task.createdAt}</div>
                    </div>
                    <div class="task-actions">
                        <button class="action-btn edit-btn" onclick="openEditModal(${task.id})" title="Edit">✏️</button>
                        <button class="action-btn delete-btn" onclick="deleteTask(${task.id})" title="Delete">🗑️</button>
                    </div>
                `;
                
                taskList.appendChild(taskItem);
            });
        }

        function updateStats() {
            const completed = tasks.filter(t => t.completed).length;
            totalTasksEl.textContent = tasks.length;
            completedTasksEl.textContent = completed;
        }

        function saveTasks() {
            localStorage.setItem('momentum_tasks', JSON.stringify(tasks));
        }

        function loadTasks() {
            const saved = localStorage.getItem('momentum_tasks');
            tasks = saved ? JSON.parse(saved) : [];
        }


        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('momentum_theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        }

        function loadTheme() {
            const theme = localStorage.getItem('momentum_theme');
            if (theme === 'dark') {
                document.body.classList.add('dark-mode');
            }
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const isDark = document.body.classList.contains('dark-mode');
            themeToggle.textContent = isDark ? '☀️' : '🌙';
        }


        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        
        editModal.addEventListener('click', (e) => {
            if (e.target === editModal) {
                closeEditModal();
            }
        });
    </script>
</body>
</html>
